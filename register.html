<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- bootstrap-icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="container-fluid background">
        <div class="row ">
            <div class="col-12 d-flex justify-content-center px-5 ">
                <form action="" class=" login-bg py-3 px-5 my-5  ">
                    <h1 class="my-2">Register</h1>
                    <label for="" class="py-2">Name</label>
                    <input type="text" class="ps-3 py-2 form-control rounded p-h" type="text" placeholder="Name">

                    <label for="" class="py-2">Email</label>
                    <input type="text" class="ps-3 py-2 form-control rounded p-h" type="email"
                        placeholder="username@gmail.com">

                    <label for="" class="py-2">Password</label>
                    <input type="text" class="ps-3 py-2 form-control rounded p-h" type="password"
                        placeholder="password">

                    <button class="btn btn-danger form-control button mt-4">Sign in</button>
                    <div class="text-center my-2">Or Continue with</div>
                    <div class="d-flex justify-content-between  px-5 mt-4 ">
                        <span style="background-color: white; " class="rounded-pill"><i
                                class="bi bi-google px-3"></i></span>
                        <span style="background-color: white; " class="rounded-pill mx-3"><i
                                class="bi bi-github px-3"></i></span>
                        <span style="background-color: white; " class="rounded-pill"><i
                                class="bi bi-facebook px-3"></i></span>
                    </div>

                    <div class="mt-4 mb-2">Already have an account
                        <a href="login.html" class="f-p">Log in</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
